{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-6 col-xl-5">
    <div class="card card-dark rounded-4 p-4 p-md-5 shadow-sm">
      <h1 class="h3 mb-2">Welcome back</h1>
      <p class="text-muted-2 mb-4">Login to continue managing your library account.</p>

      <form method="post">
        {% csrf_token %}

        <div class="mb-3">
          <label class="form-label">Username</label>
          <input type="text" name="username" class="form-control form-control-lg" placeholder="Enter username" required>
        </div>

        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-control form-control-lg" placeholder="Enter password" required>
        </div>

        <div class="d-grid mt-4">
          <button type="submit" class="btn btn-accent btn-lg">Login</button>
        </div>
      </form>

      <p class="mt-4 mb-0 text-center text-muted-2">
        New user? <a href="{% url 'register' %}">Register here</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
